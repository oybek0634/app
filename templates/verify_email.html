<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Emailni tasdiqlash</title>
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card shadow border-0 p-4">
                    <div class="text-center mb-4">
                        <h3 class="fw-bold">Tasdiqlash kodi</h3>
                        <p class="text-muted small">Emailingizga yuborilgan 6 xonali kodni kiriting</p>
                    </div>

                    {% if messages %}
                        {% for message in messages %}
                            <div class="alert alert-danger small py-2">{{ message }}</div>
                        {% endfor %}
                    {% endif %}

                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-4">
                            <input type="text" name="code" class="form-control form-control-lg text-center fw-bold"
                                   placeholder="000000" maxlength="6" required autocomplete="off" style="letter-spacing: 5px;">
                        </div>
                        <button type="submit" class="btn btn-primary w-100 fw-bold py-2">Tasdiqlash</button>
                    </form>

                    <div class="text-center mt-3">
                        <a href="{% url 'signup' %}" class="text-decoration-none small text-muted">Qaytadan ro'yxatdan o'tish</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
